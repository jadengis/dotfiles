# ╔═══════════════════════════════════════════════════════════════════════════╗
# ║ gpg-agent configuration (~/.gnupg/gpg-agent.conf)                         ║
# ║                                                                           ║
# ║ Note:                                                                     ║
# ║ After changing the configuration, reload the agent:                       ║
# ║   $ gpg-connect-agent reloadagent /bye                                    ║
# ╚═══════════════════════════════════════════════════════════════════════════╝


# Passphrase cache: default-cache-ttl is the idle window — if you go this long
# without any gpg use, the cached passphrase is dropped even when max-cache-ttl
# is huge. Match them so one unlock lasts until max-cache-ttl (good for git
# commits and mbsync from a desktop that is only unlocked intermittently,
# e.g. remote Cursor from a phone).
default-cache-ttl 31622400

# Absolute cap since the passphrase was first cached (seconds). Default: 7200.
# 31622400 ≈ 366 days. After this, gpg will ask again even with steady use.
max-cache-ttl 31622400
